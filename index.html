<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC Binnenmaas 1 — Trainers app</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --fcb-groen:#2B7A30;
  --fcb-groen-licht:#E8F5E9;
  --fcb-geel:#E8C400;
  --fcb-geel-licht:#FFF9E0;
  --bg:#f9f9f9;
  --white:#ffffff;
  --border:#e5e5e5;
  --text:#1a1a1a;
  --text-muted:#6b7280;
  --text-light:#9ca3af;
  --radius:8px;
  --radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:1.5rem 1rem}

/* Header */
.header{background:var(--fcb-groen);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem}
.header-top{display:flex;align-items:center;gap:14px;padding:14px 18px}
.logo-wrap{position:relative;width:52px;height:52px;flex-shrink:0;cursor:pointer}
.logo-ph{width:52px;height:52px;border-radius:var(--radius);border:1.5px dashed rgba(255,255,255,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:rgba(255,255,255,.08)}
.logo-img{width:52px;height:52px;border-radius:var(--radius);object-fit:cover;display:none;border:2px solid rgba(255,255,255,.4)}
.logo-ov{position:absolute;inset:0;border-radius:var(--radius);background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.logo-wrap:hover .logo-ov{opacity:1}
.header-title{font-size:18px;font-weight:600;color:white}
.header-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px;display:flex;align-items:center;gap:6px}
.season-badge{background:rgba(255,255,255,.15);border:0.5px solid rgba(255,255,255,.3);border-radius:99px;padding:1px 8px;font-size:11px;color:white;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.season-badge:hover{background:rgba(255,255,255,.25)}
.hdr-actions{display:flex;gap:6px;margin-left:auto}
.hbtn{background:rgba(255,255,255,.15);border:0.5px solid rgba(255,255,255,.3);border-radius:var(--radius);padding:5px 10px;font-size:12px;color:white;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.hbtn:hover{background:rgba(255,255,255,.25)}
.accent-bar{height:4px;background:var(--fcb-geel)}
.nav{display:flex;gap:4px;padding:10px 18px;background:var(--white);flex-wrap:wrap}
.nb{padding:5px 12px;border-radius:99px;font-size:13px;cursor:pointer;color:var(--text-muted);background:transparent;border:none;font-family:inherit;display:flex;align-items:center;gap:5px}
.nb:hover{background:#f3f4f6}
.nb.active{background:var(--fcb-groen);color:white;font-weight:500}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.gdot{width:8px;height:8px;border-radius:50%;background:var(--fcb-groen);flex-shrink:0}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.btn-green{background:var(--fcb-groen);color:white;border:none;border-radius:var(--radius);padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn-green:hover{background:#236227}
.btn-outline{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;color:var(--text)}
.btn-outline:hover{background:#f3f4f6}
.btn-danger{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;color:#dc2626}
.btn-danger:hover{background:#fef2f2}
.back-btn{background:none;border:none;cursor:pointer;color:var(--fcb-groen);font-size:13px;font-family:inherit;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:1rem}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:500px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--fcb-groen);opacity:.3}
.stat-box.accent::before{background:var(--fcb-geel);opacity:1}
.stat-val{font-size:24px;font-weight:600}
.stat-lbl{font-size:11px;color:var(--text-muted);margin-top:3px}

/* Badges */
.pos-pill{font-size:10px;padding:2px 7px;border-radius:99px;background:var(--fcb-groen-licht);color:#1B5E20;display:inline-block}
.bles-pill{font-size:10px;padding:2px 7px;border-radius:99px;background:#fef2f2;color:#dc2626;display:inline-block}
.nr-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--fcb-groen);color:white;font-size:10px;font-weight:600;flex-shrink:0}
.status-ok{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--fcb-groen-licht);color:#1B5E20}
.status-bles{font-size:11px;padding:2px 8px;border-radius:99px;background:#fef2f2;color:#dc2626}
.type-badge{font-size:10px;padding:2px 7px;border-radius:99px;background:#f3f4f6;color:var(--text-muted);border:1px solid var(--border)}
.badge-thuis{font-size:10px;padding:2px 6px;border-radius:99px;background:var(--fcb-groen-licht);color:#1B5E20}
.badge-uit{font-size:10px;padding:2px 6px;border-radius:99px;background:var(--fcb-geel-licht);color:#78610a}

/* Match rows */
.match-row{display:grid;grid-template-columns:80px 1fr auto;gap:12px;align-items:center;padding:10px 14px;background:#f9f9f9;border-radius:var(--radius);margin-bottom:6px;border:1px solid transparent;cursor:pointer}
.match-row:hover{border-color:var(--fcb-groen)}
.score{font-size:14px;font-weight:600;padding:2px 10px;border-radius:var(--radius)}
.score.win{background:var(--fcb-groen-licht);color:#1B5E20}
.score.draw{background:var(--fcb-geel-licht);color:#78610a}
.score.loss{background:#fef2f2;color:#dc2626}

/* View toggle */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.vt-btn{padding:5px 10px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);font-family:inherit;display:flex;align-items:center}
.vt-btn:not(:last-child){border-right:1px solid var(--border)}
.vt-btn.active{background:var(--fcb-groen);color:white}
.vt-btn:hover:not(.active){background:#f3f4f6}

/* Tegel weergave spelers */
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.tile-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;display:flex;align-items:center;gap:12px;padding:10px 12px;transition:border-color .15s}
.tile-card:hover{border-color:var(--fcb-groen)}
.tile-photo{width:48px;height:48px;border-radius:var(--radius);object-fit:cover;flex-shrink:0}
.tile-ph{width:48px;height:48px;border-radius:var(--radius);background:var(--fcb-groen-licht);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:600;color:var(--fcb-groen)}

/* Lijst weergave */
.list-table{width:100%;border-collapse:collapse}
.list-table th{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;border-bottom:1px solid var(--border);text-align:left}
.list-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr{cursor:pointer}
.list-table tr:hover td{background:#f9f9f9}
.list-av{width:32px;height:32px;border-radius:6px;object-fit:cover}
.list-av-ph{width:32px;height:32px;border-radius:6px;background:var(--fcb-groen-licht);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--fcb-groen)}

/* Speler detail */
.detail-layout{display:grid;grid-template-columns:140px 1fr;gap:1.25rem;align-items:start}
@media(max-width:500px){.detail-layout{grid-template-columns:1fr}}
.det-photo{width:140px;height:140px;border-radius:var(--radius-lg);object-fit:cover;border:1px solid var(--border)}
.det-ph{width:140px;height:140px;border-radius:var(--radius-lg);background:var(--fcb-groen-licht);display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-box{background:#f9f9f9;border-radius:var(--radius);padding:10px 12px}
.info-lbl{font-size:11px;color:var(--text-muted);margin-bottom:3px}
.info-val{font-size:14px;font-weight:600;color:var(--text)}

/* Formaties */
.form-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.form-opt{padding:7px;border:1px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;font-size:12px;color:var(--text-muted);background:var(--white)}
.form-opt.selected{background:var(--fcb-groen-licht);border-color:var(--fcb-groen);color:#1B5E20;font-weight:600}

/* Veld */
.field-outer{background:#2a5c17;border-radius:var(--radius-lg);padding:10px;width:100%;max-width:280px;margin:0 auto}

/* Seizoenen */
.season-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f9f9f9;border-radius:var(--radius);margin-bottom:6px;border:1px solid transparent}
.season-row.active-season{border-color:var(--fcb-groen);background:var(--fcb-groen-licht)}
.s-actief{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--fcb-groen-licht);color:#1B5E20}
.s-archief{font-size:11px;padding:2px 8px;border-radius:99px;background:#f3f4f6;color:var(--text-muted);border:1px solid var(--border)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:3px 5px;border-radius:var(--radius);font-size:15px}
.icon-btn:hover{background:#f3f4f6;color:var(--text)}
.icon-btn.danger:hover{color:#dc2626}

/* Tab bar */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--fcb-groen);border-bottom-color:var(--fcb-groen);font-weight:600}

/* Rol badges */
.badge-staf{background:#e0f2fe;color:#0369a1;font-size:11px;padding:2px 8px;border-radius:99px}
.badge-speler{background:var(--fcb-groen-licht);color:#1B5E20;font-size:11px;padding:2px 8px;border-radius:99px}
.badge-fan{background:var(--fcb-geel-licht);color:#78610a;font-size:11px;padding:2px 8px;border-radius:99px}

/* Live */
.live-badge{background:#dc2626;color:white;font-size:10px;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px}
.clock-display{font-size:28px;font-weight:700;letter-spacing:.06em;font-variant-numeric:tabular-nums;color:var(--text)}
.clock-extra{color:#dc2626}

/* Form inputs */
.field-input{border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);width:100%}
.field-input:focus{outline:none;border-color:var(--fcb-groen);box-shadow:0 0 0 3px rgba(43,122,48,.1)}
.field-label{font-size:12px;color:var(--text-muted);margin-bottom:4px;display:block}
.field-box{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}

/* Toast */
.toast{background:var(--fcb-groen-licht);border:1px solid var(--fcb-groen);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#1B5E20;display:flex;align-items:center;gap:8px;margin-bottom:1rem}

/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}

/* Rollen */
.user-row{display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:start;padding:12px 14px;background:#f9f9f9;border-radius:var(--radius);margin-bottom:8px}
.user-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}

/* Skills */
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.skill-bar-bg{flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.skill-bar{height:100%;border-radius:3px;background:var(--fcb-groen)}

/* Blessure */
.bles-row{display:flex;align-items:start;justify-content:space-between;padding:10px 12px;background:#f9f9f9;border-radius:var(--radius);margin-bottom:6px;border:1px solid var(--border)}
.bles-actief{border-color:#dc2626}

/* Wedstrijd events */
.event-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f9f9f9;border-radius:var(--radius);font-size:13px;margin-bottom:6px}
.event-min{font-size:12px;font-weight:600;color:var(--text-muted);width:42px;flex-shrink:0;font-variant-numeric:tabular-nums}
</style>
</head>

</div>

// ============================================================
// HELPERS
// ============================================================
function pad(n){return String(Math.floor(n)).padStart(2,'0');}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}-${m}-${y}`;}
function scClass(w){if(!w.score)return'';return w.score.e>w.score.t?'win':w.score.e<w.score.t?'loss':'draw';}
function activeSeizoen(){return seizoenen.find(s=>s.actief);}
function showToast(msg){toast=msg;draw();setTimeout(()=>{toast=null;draw();},3000);}

// Klok
function klokSeconds(){
  if(!klokStart||klokPhase==='voor'||klokPhase==='rust'||klokPhase==='afgelopen') return klokElapsed;
  return klokElapsed+Math.floor((Date.now()-klokStart)/1000);
}
function klokLabel(){
  const s=klokSeconds(),mm=Math.floor(s/60),ss=s%60;
  if(klokPhase==='rust') return{display:'HT',extra:false};
  if(klokPhase==='afgelopen') return{display:'FT',extra:false};
  if(klokPhase==='voor') return{display:'00:00',extra:false};
  if(mm>=90) return{display:`90+${pad(mm-90)}:${pad(ss)}`,extra:true};
  return{display:`${pad(mm)}:${pad(ss)}`,extra:false};
}
function klokNu(){const s=klokSeconds(),mm=Math.floor(s/60),ss=s%60;if(mm>=90)return`90+${pad(mm-90)}:${pad(ss)}`;return`${pad(mm)}:${pad(ss)}`;}
function startEerste(){klokPhase='eerste';klokElapsed=0;klokStart=Date.now();klokInterval=setInterval(draw,500);draw();}
function startRust(){clearInterval(klokInterval);klokElapsed=klokSeconds();klokStart=null;klokPhase='rust';draw();}
function startTweede(){klokPhase='tweede';klokElapsed=45*60;klokStart=Date.now();klokInterval=setInterval(draw,500);draw();}
function eindWedstrijd(){clearInterval(klokInterval);klokElapsed=klokSeconds();klokStart=null;klokPhase='afgelopen';draw();}

// ============================================================
// RENDER
// ============================================================
function setPage(p){
  page=p;activeSpelerId=null;activeWedstrijdId=null;
  document.querySelectorAll('.nb').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','spelers','wedstrijden','ontwikkeling','rollen'][i]===p);
  });
  draw();
}

function draw(){
  const el=document.getElementById('pageContent');
  let html='';
  if(toast) html+=`<div class="toast"><i class="ti ti-circle-check" style="font-size:16px"></i>${toast}</div>`;
  if(beheerOpen){html+=renderBeheer();}
  else if(page==='dashboard') html+=renderDashboard();
  else if(page==='spelers')   html+=activeSpelerId?renderSpelerDetail():renderSpelers();
  else if(page==='wedstrijden') html+=activeWedstrijdId?renderWedstrijdDetail():renderWedstrijden();
  else if(page==='ontwikkeling') html+=renderOntwikkeling();
  else if(page==='rollen')    html+=renderRollen();
  el.innerHTML=html;
}

// ---- DASHBOARD ----
function renderDashboard(){
  const gs=wedstrijden.filter(w=>w.status==='gespeeld');
  const w=gs.filter(w=>w.score&&w.score.e>w.score.t).length;
  const g=gs.filter(w=>w.score&&w.score.e===w.score.t).length;
  const v=gs.filter(w=>w.score&&w.score.e<w.score.t).length;
  const df=gs.reduce((s,w)=>s+(w.score?w.score.e-w.score.t:0),0);
  const rows=wedstrijden.slice(0,3).map(w=>`
    <div class="match-row" onclick="activeWedstrijdId=${w.id};setPage('wedstrijden')">
      <div style="font-size:12px;color:var(--text-muted)">${fmtDate(w.datum)}<br><strong style="color:var(--text)">${w.thuis?'Thuis':'Uit'}</strong></div>
      <div>
        <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          FC Binnenmaas 1 <span class="score ${scClass(w)}">${w.score?`${w.score.e}-${w.score.t}`:w.status==='live'?'LIVE':'Gepland'}</span> ${w.teg}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap">
          <span class="${w.thuis?'badge-thuis':'badge-uit'}">${w.thuis?'Thuis':'Uit'}</span>
          <span class="type-badge">${w.type}</span>
        </div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text-muted)"></i>
    </div>`).join('');
  const chips=spelers.slice(0,6).map(sp=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f9f9f9;border-radius:var(--radius);border:1px solid var(--border)">
      ${sp.foto?`<img src="${sp.foto}" style="width:32px;height:32px;border-radius:6px;object-fit:cover;flex-shrink:0" alt="">`:`<div style="width:32px;height:32px;border-radius:6px;background:var(--fcb-groen-licht);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--fcb-groen);flex-shrink:0">${sp.init}</div>`}
      <div><div style="font-size:13px;font-weight:600">${sp.naam}</div><div style="font-size:11px;color:var(--text-muted)">${sp.pos}</div></div>
    </div>`).join('');
  return`
    <div class="stats-row">
      <div class="stat-box accent"><div class="stat-val" style="color:var(--fcb-groen)">${w}</div><div class="stat-lbl">Gewonnen</div></div>
      <div class="stat-box"><div class="stat-val">${g}</div><div class="stat-lbl">Gelijk</div></div>
      <div class="stat-box"><div class="stat-val">${v}</div><div class="stat-lbl">Verloren</div></div>
      <div class="stat-box accent"><div class="stat-val" style="color:${df>=0?'var(--fcb-groen)':'#dc2626'}">${df>0?'+':''}${df}</div><div class="stat-lbl">Doelsaldo</div></div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title"><div class="gdot"></div>Recente wedstrijden</div>
        <span style="font-size:12px;color:var(--fcb-groen);cursor:pointer" onclick="setPage('wedstrijden')">Alle wedstrijden <i class="ti ti-arrow-right" style="font-size:12px"></i></span>
      </div>${rows}
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title"><div class="gdot"></div>Selectie</div>
        <span style="font-size:12px;color:var(--fcb-groen);cursor:pointer" onclick="setPage('spelers')">Alle spelers <i class="ti ti-arrow-right" style="font-size:12px"></i></span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">${chips}</div>
    </div>`;
}

function renderSpelers(){

let spelersTab='profiel';
let addBlessureForm=false;
let nextBlesId=10;

function slaaBlessureOp(spelerId){
  const naam=document.getElementById('bles-naam')?.value.trim();
  const start=document.getElementById('bles-start')?.value;
  const eind=document.getElementById('bles-eind')?.value||'';
  if(!naam||!start) return;
  const sp=spelers.find(s=>s.id===spelerId);
  sp.blessures.push({id:nextBlesId++,naam,startdatum:start,einddatum:eind});
  if(!eind) sp.status='geblesseerd';
  addBlessureForm=false;
  draw();
}

function deleteBlessure(spelerId,blesId){
  const sp=spelers.find(s=>s.id===spelerId);
  sp.blessures=sp.blessures.filter(b=>b.id!==blesId);
  if(!sp.blessures.find(b=>!b.einddatum)) sp.status='beschikbaar';
  draw();
}

function setEinddatum(spelerId,blesId){
  const today=new Date().toISOString().split('T')[0];
  const sp=spelers.find(s=>s.id===spelerId);
  sp.blessures.find(b=>b.id===blesId).einddatum=today;
  if(!sp.blessures.find(b=>!b.einddatum)) sp.status='beschikbaar';
  draw();
}

function toggleSkillVis(spelerId,cat){
  const sp=spelers.find(s=>s.id===spelerId);
  sp.skillVis[cat]=!sp.skillVis[cat];
  draw();
}


// ---- WEDSTRIJDEN ----
function renderWedstrijden(){
  const gs=wedstrijden.filter(w=>w.status==='gespeeld');
  const w=gs.filter(w=>w.score&&w.score.e>w.score.t).length;
  const g=gs.filter(w=>w.score&&w.score.e===w.score.t).length;
  const v=gs.filter(w=>w.score&&w.score.e<w.score.t).length;
  const df=gs.reduce((s,w)=>s+(w.score?w.score.e-w.score.t:0),0);
  const rows=wedstrijden.map(w=>`
    <div class="match-row" onclick="activeWedstrijdId=${w.id};wedstrijdTab='opstelling';draw()">
      <div style="font-size:12px;color:var(--text-muted)">${fmtDate(w.datum)}<br><strong style="color:var(--text)">${w.thuis?'Thuis':'Uit'}</strong></div>
      <div>
        <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          FC Binnenmaas 1
          <span class="score ${scClass(w)}">${w.status==='live'?`<span class="live-badge"><i class="ti ti-circle-filled" style="font-size:8px"></i> LIVE</span> ${w.score.e}-${w.score.t}`:w.score?`${w.score.e}-${w.score.t}`:'Gepland'}</span>
          ${w.teg}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap">
          <span class="${w.thuis?'badge-thuis':'badge-uit'}">${w.thuis?'Thuis':'Uit'}</span>
          <span class="type-badge">${w.type}</span>
          <span style="color:var(--text-muted)">${w.formatie}</span>
        </div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text-muted)"></i>
    </div>`).join('');
  return`
    <div class="stats-row">
      <div class="stat-box accent"><div class="stat-val" style="color:var(--fcb-groen)">${w}</div><div class="stat-lbl">Gewonnen</div></div>
      <div class="stat-box"><div class="stat-val">${g}</div><div class="stat-lbl">Gelijk</div></div>
      <div class="stat-box"><div class="stat-val">${v}</div><div class="stat-lbl">Verloren</div></div>
      <div class="stat-box accent"><div class="stat-val" style="color:${df>=0?'var(--fcb-groen)':'#dc2626'}">${df>0?'+':''}${df}</div><div class="stat-lbl">Doelsaldo</div></div>
    </div>
    <div class="card">
      <div class="card-hdr">
        <div class="card-title"><div class="gdot"></div>Alle wedstrijden (${wedstrijden.length})</div>
        <button class="btn-green" style="font-size:12px;padding:6px 12px" onclick="toonNieuweWedstrijd=!toonNieuweWedstrijd;draw()"><i class="ti ti-plus" style="font-size:13px"></i> Toevoegen</button>
      </div>
      ${toonNieuweWedstrijd?renderNieuweWedstrijd():''}
      ${rows}
    </div>`;
}

function slaaNieuweWedstrijdOp(){
  const datum=document.getElementById('nw-datum')?.value;
  const teg=document.getElementById('nw-teg')?.value.trim();
  const loc=document.getElementById('nw-loc')?.value;
  const type=document.getElementById('nw-type')?.value;
  if(!datum||!teg) return;
  wedstrijden.push({id:nextWedstrijdId++,datum,teg,thuis:loc==='thuis',formatie:nieuweW.formatie,type,score:null,status:'gepland',opstelling:[1,3,5,6,10,11,13,16,17,19,21],bank:[],events:[]});
  wedstrijden.sort((a,b)=>a.datum.localeCompare(b.datum));
  toonNieuweWedstrijd=false;
  nieuweW={datum:'',teg:'',thuis:true,formatie:'4-3-3',type:'Competitie'};
  showToast('Wedstrijd toegevoegd!');
}

const FILTERS=[
  {key:'all',label:'Alles',        days:null},
  {key:'w1', label:'Laatste week', days:7},
  {key:'m1', label:'Laatste maand',days:30},
  {key:'m3', label:'3 maanden',    days:90},
  {key:'m6', label:'6 maanden',    days:180},
];

let ontwikkelingSpelerId=1;
let expandedSubs={};
let subFilters={};
let addBeeldIn=null;
let beeldIdCounter=100;

function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}
function filterBeelden(beelden,fk){
  const f=FILTERS.find(x=>x.key===fk)||FILTERS[0];
  if(!f.days) return beelden;
  const cutoff=daysAgo(f.days);
  return beelden.filter(b=>b.datum&&b.datum>=cutoff);
}
function fmtDateB(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}-${m}-${y}`;}
function getSub(subId){for(const cat of CATS){const s=cat.subs.find(s=>s.id===subId);if(s)return s;}return null;}
function getCatForSub(subId){return CATS.find(cat=>cat.subs.some(s=>s.id===subId));}

function renderOntwikkeling(){
  const sp=spelers.find(s=>s.id===ontwikkelingSpelerId)||spelers[0];

  const spelerSwitch=`
    <div style="display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:1rem;flex-wrap:wrap">
      <i class="ti ti-user" style="font-size:16px;color:var(--fcb-groen)"></i>
      <span style="font-size:13px;color:var(--text-muted)">Speler:</span>
      <select onchange="ontwikkelingSpelerId=parseInt(this.value);draw()" style="border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text)">
        ${spelers.map(s=>`<option value="${s.id}"${s.id===ontwikkelingSpelerId?' selected':''}>${s.naam}</option>`).join('')}

    </div>`;

  const catCards=CATS.map(cat=>{
    const avg=Math.round(cat.subs.reduce((a,s)=>a+s.score,0)/cat.subs.length);
    const subRows=cat.subs.map(sub=>{
      const isOpen=expandedSubs[sub.id];
      const activeFilter=subFilters[sub.id]||'all';
      const filtered=filterBeelden(sub.beelden,activeFilter);
      const total=sub.beelden.length;

      const beeldPanel=isOpen?`
        <div style="background:#f9f9f9;border-top:1px solid var(--border);padding:12px 14px">
          ${total>0?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap">
            <span style="font-size:11px;color:var(--text-muted)"><i class="ti ti-clock" style="font-size:12px;vertical-align:-1px"></i> Periode:</span>
            ${FILTERS.map(f=>`<span onclick="subFilters['${sub.id}']='${f.key}';draw()" style="padding:3px 10px;border-radius:99px;font-size:11px;cursor:pointer;border:1px solid ${activeFilter===f.key?cat.kleur:'var(--border)'};background:${activeFilter===f.key?cat.kleur+'15':'var(--white)'};color:${activeFilter===f.key?cat.kleur:'var(--text-muted)'};font-weight:${activeFilter===f.key?'600':'400'}">${f.label}</span>`).join('')}
            <span style="font-size:11px;color:var(--text-muted);margin-left:auto">${filtered.length} van ${total}</span>
          </div>`:''}
          ${total===0&&addBeeldIn!==sub.id?`<div style="text-align:center;padding:10px 0;font-size:13px;color:var(--text-muted)"><i class="ti ti-video-off" style="font-size:16px;display:block;margin:0 auto 4px"></i>Nog geen beelden</div>`:''}
          ${filtered.length===0&&total>0&&addBeeldIn!==sub.id?`<div style="text-align:center;padding:10px 0;font-size:13px;color:var(--text-muted)"><i class="ti ti-filter" style="font-size:15px;vertical-align:-2px"></i> Geen beelden in deze periode (wel ${total} buiten filter)</div>`:''}
          ${filtered.map(b=>`
            <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;display:grid;grid-template-columns:100px 1fr auto;gap:8px;align-items:start">
              <div><div style="font-size:10px;color:var(--text-muted)">Datum</div><div style="font-size:12px;font-weight:600">${fmtDateB(b.datum)}</div></div>
              <div>
                <a href="${b.url}" target="_blank" rel="noopener" style="font-size:13px;color:#185FA5;word-break:break-all;text-decoration:none"><i class="ti ti-external-link" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${b.url}</a>
                ${b.opmerking?`<div style="font-size:11px;color:var(--text-muted);margin-top:3px;font-style:italic">"${b.opmerking}"</div>`:''}
              </div>
              <button onclick="deletBeeld('${sub.id}','${b.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px 4px;font-size:14px" title="Verwijder"><i class="ti ti-trash"></i></button>
            </div>`).join('')}
          ${addBeeldIn===sub.id?`
            <div style="background:var(--white);border:1px dashed var(--border);border-radius:var(--radius);padding:12px;margin-top:4px">
              <div style="display:grid;grid-template-columns:130px 1fr;gap:8px;margin-bottom:8px">
                <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px">Datum</label>
                  <input type="date" id="bd-datum-${sub.id}" style="width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:inherit"></div>
                <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px">URL <span style="color:#dc2626">*</span></label>
                  <input type="url" id="bd-url-${sub.id}" placeholder="https://..." style="width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:inherit"></div>
              </div>
              <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px">Opmerking</label>
                <input type="text" id="bd-opm-${sub.id}" placeholder="bijv. goede actie op 1:24" style="width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:inherit"></div>
              <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
                <button onclick="addBeeldIn=null;draw()" class="btn-outline" style="font-size:12px;padding:5px 12px">Annuleren</button>
                <button onclick="slaBeeldOp('${sub.id}')" class="btn-green" style="font-size:12px;padding:5px 12px"><i class="ti ti-check" style="font-size:12px"></i> Opslaan</button>
              </div>
            </div>`:''}
          <button onclick="addBeeldIn='${sub.id}';draw()" style="background:none;border:none;cursor:pointer;color:#185FA5;font-size:12px;font-family:inherit;padding:4px 0;display:flex;align-items:center;gap:4px;margin-top:4px"><i class="ti ti-plus" style="font-size:13px"></i> Beeld toevoegen</button>
        </div>`:'' ;

      return`
        <div style="border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;background:var(--white)" onclick="expandedSubs['${sub.id}']=!expandedSubs['${sub.id}'];draw()">
            <i class="ti ti-chevron-${isOpen?'down':'right'}" style="font-size:13px;color:var(--text-muted);flex-shrink:0"></i>
            <span style="font-size:13px;flex:1">${sub.naam}${total>0?` <span style="font-size:10px;background:#e0f2fe;color:#0369a1;padding:1px 6px;border-radius:99px;margin-left:4px">${total}</span>`:''}</span>
            <div style="flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;max-width:120px" onclick="event.stopPropagation()">
              <div style="height:100%;border-radius:3px;background:${cat.kleur};width:${sub.score}%"></div>
            </div>
            <span style="font-size:12px;font-weight:600;width:34px;text-align:right" onclick="event.stopPropagation()">${sub.score}%</span>
          </div>
          ${beeldPanel}
        </div>`;
    }).join('');

    return`<div class="card">
      <div class="card-hdr">
        <div class="card-title"><div style="width:10px;height:10px;border-radius:50%;background:${cat.kleur};flex-shrink:0"></div>${cat.label}</div>
        <span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;background:${cat.kleur}20;color:${cat.kleur}">${avg}%</span>
      </div>${subRows}
    </div>`;
  }).join('');

  return spelerSwitch+catCards;
}

function slaBeeldOp(subId){
  const url=document.getElementById(`bd-url-${subId}`)?.value.trim();
  if(!url) return;
  const datum=document.getElementById(`bd-datum-${subId}`)?.value||'';
  const opmerking=document.getElementById(`bd-opm-${subId}`)?.value.trim()||'';
  const sub=getSub(subId);
  if(sub) sub.beelden.push({id:'b'+(beeldIdCounter++),datum,url,opmerking});
  addBeeldIn=null;
  draw();
}

function deletBeeld(subId,beeldId){
  const sub=getSub(subId);
  if(sub) sub.beelden=sub.beelden.filter(b=>b.id!==beeldId);
  draw();
}

function slaClubOp(){
  const naam=document.getElementById('clubNaamInput')?.value.trim();
  if(!naam) return;
  clubNaam=naam;
  document.getElementById('clubNaamDisplay').textContent=naam;
  closeBeheer();
  showToast('Clubnaam opgeslagen');
}

function activeerSeizoen(id){
  seizoenen.forEach(s=>s.actief=false);
  seizoenen.find(s=>s.id===id).actief=true;
  document.getElementById('seizoenLabel').textContent=seizoenen.find(s=>s.id===id).naam;
  draw();
}

function verwijderSeizoen(id){
  const s=seizoenen.find(x=>x.id===id);
  if(s.actief) return;
  seizoenen.splice(seizoenen.indexOf(s),1);
  draw();
}

function addSeizoen(){
  const el=document.getElementById('nieuwSeizoenInput');
  const naam=el?.value.trim();
  if(!naam) return;
  seizoenen.push({id:nextSeizoenId++,naam,actief:false});
  el.value='';
  draw();
}

// ---- FOTO UPLOADS ----
function uploadSpelerFoto(e){
  const file=e.target.files[0];
  if(!file||!fotoTarget) return;
  const r=new FileReader();
  r.onload=ev=>{spelers.find(s=>s.id===fotoTarget).foto=ev.target.result;fotoTarget=null;draw();};
  r.readAsDataURL(file);
  e.target.value='';
}

function uploadLogo(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    document.getElementById('limg').src=ev.target.result;
    document.getElementById('limg').style.display='block';
    document.getElementById('lph').style.display='none';
    document.getElementById('rmLogoBtn').style.display='inline-flex';
  };
  r.readAsDataURL(file);
}

function removeLogo(){
  document.getElementById('limg').src='';
  document.getElementById('limg').style.display='none';
  document.getElementById('lph').style.display='flex';
  document.getElementById('rmLogoBtn').style.display='none';
  document.getElementById('lf').value='';
}

// ---- START ----
draw();
</script>
